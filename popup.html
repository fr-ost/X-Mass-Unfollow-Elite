<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>X Mass Unfollow Elite</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="wrap">
    <header>
      <img src="icon48.png" class="icon">
      <div>
        <h1>X Unfollow Elite</h1>
        <p>Controlled session manager</p>
      </div>
    </header>

    <section class="stats">
      <div class="stat">
        <b id="count">0</b>
        <span>Unfollowed</span>
      </div>
      <div class="stat">
        <b id="scanned">0</b>
        <span>Scanned</span>
      </div>
    </section>

    <section class="panel">
      <div class="status">
        <i id="dot"></i>
        <span id="statusText">Ready</span>
      </div>
      <div class="mode" id="modeText">Mode: Idle</div>
    </section>

    <section class="actions">
      <button id="nonFollowers" class="primary">Unfollow Non Followers</button>
      <button id="all" class="secondary">Unfollow All</button>
      <div class="two">
        <button id="pause" class="ghost">Pause</button>
        <button id="resume" class="ghost">Resume</button>
      </div>
      <button id="stop" class="danger">Stop</button>
      <button id="settings" class="settings">Settings</button>
      <button id="contact" class="settings">Contact Me: @igfrostt</button>
    </section>

    <footer>
      Developed by <b>Shahriar Ahmed</b><br>
      Telegram: <b>@igfrostt</b>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
